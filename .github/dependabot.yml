version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    # Dependabot's default rebase-strategy ("auto") rebases EVERY open bot PR
    # whenever `main` moves — so merging any one PR fires a rebase across all
    # the others, each triggering the required Build APK at once. On the
    # self-hosted runners (familiar, 5g heap) that concurrent swarm OOM-kills
    # the build daemon (seen during the #1610 merge cascade: 7 open gradle PRs
    # → 7 simultaneous Android builds). "disabled" keeps the open PRs static;
    # rebase one on demand with `@dependabot rebase`, or let the serialized
    # merge cascade update each as it's picked up.
    rebase-strategy: "disabled"
    assignees:
      - "jphein"
    labels:
      - "dependencies"
    groups:
      kotlin-ecosystem:
        patterns:
          - "kotlin*"
          - "ksp*"
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"
      compose:
        patterns:
          - "compose-*"
          - "androidx.compose*"
      lifecycle:
        patterns:
          - "lifecycle-*"
          - "androidx.lifecycle*"
      media3:
        patterns:
          - "media3-*"
          - "androidx.media3*"
      room:
        patterns:
          - "room-*"
          - "androidx.room*"
      hilt:
        patterns:
          - "hilt*"
          - "com.google.dagger*"
          - "dagger.hilt*"
      wear:
        patterns:
          - "wear-*"
          - "androidx.wear*"
      testing:
        patterns:
          - "junit"
          - "junit-*"
          - "espresso*"
          - "androidx.test.espresso*"
          - "robolectric*"
          - "org.robolectric*"
          - "uiautomator*"
          - "androidx.test.uiautomator*"
          - "benchmark*"
          - "androidx.benchmark*"
    ignore:
      - dependency-name: "com.squareup.okhttp3:*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "io.coil-kt*:*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "io.coil-kt.coil3*:*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "com.android.tools.build:gradle"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "com.android.application"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "com.android.library"
        update-types:
          - "version-update:semver-major"
